<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Page Clone</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>
<body style="background-color: black;">
      <div class="container">
        <header class="flex justify-between">
            <div class="logo flex align-center">
              <i class="fa-brands fa-spotify"></i>
            </div>
            <div class="menu flex align-center">
                <div class="homeIcon">
                    <i class="fa-solid fa-house" style="color: white; font-size: 20px;"></i>
                </div>
                <div class="search-box">
                 <input type="text" class="softer-dark-gray" placeholder="What do you want to play?">
                 <i class="fa-solid fa-magnifying-glass" style="color: gray;"></i>
                </div>
            </div>
            <div class="login flex align-center" style="gap: 5px;">
                <a href="#" class="signup">Sign up</a>
                <a href="#" class="loginButton">Login</a>
            </div>
        </header>
       <div class="left dark-background">
           <div class="title flex justify-between align-center">
            <p>Your Library</p>
            <div class="create">
                <i class="fa-solid fa-plus"></i>
                
            </div>
           </div>
       <div class="right"></div>
      </div>



      



</body>
</html>
